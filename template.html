<!DOCTYPE html>

<!--
    logicacode — Base Page Template
    Copy this file to create any new page.

    Steps:

<html lang="en">

    <meta property="og:title"       content="Page Title — logicacode">
    <meta property="og:description" content="Page description (150–160 chars).">
    <meta property="og:image"       content="https://logicacode.com/assets/img/og-default.jpg">
    <meta property="og:url"         content="https://logicacode.com/PAGE-PATH/">
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="logicacode">

    <!-- Canonical -->
    <link rel="canonical" href="https://logicacode.com/PAGE-PATH/">
    <!-- ── END: per-page fields ───────────────────────────────────────── -->

    <!-- Meta -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="https://logicacode.com/">

    <!-- Favicon -->

        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

            data-settings-id="Wtpma_KU1m3fA0"

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;600;700&display=swap"

    <!-- New shared nav + footer styles -->
    <link rel="stylesheet" href="/assets/css/lc-nav.css">

    <!-- Component loader (injects header.html + footer.html) — load before lc-nav.js -->
    <script src="/assets/js/lc-components.js" defer></script>

    <!-- Nav behaviour (sticky, mega-menu, mobile drawer) -->
    <script src="/assets/js/lc-nav.js" defer></script>

</head>
